<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

  :root{
    --bg:#F6F4EE;
    --grid: rgba(28,37,65,0.055);
    --ink:#1C2541;
    --ink-soft:#5B6685;
    --line:#DCD8CC;
    --card:#FFFFFF;
    --growth:#3E7C59;
    --growth-bg:#E7F1EA;
    --alert:#B23A48;
    --alert-bg:#F7E7E7;
    --gold:#B4842A;
    --gold-bg:#F5EBD6;
    --stamp:#B3392E;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    width:100%;
    background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:26px 26px;
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
  }
  #root{ padding:32px 20px 64px; }
  .ss-mono{ font-family:'JetBrains Mono', monospace; }
  .ss-serif{ font-family:'Zen Old Mincho', serif; }
  .ss-wrap{ max-width:960px; margin:0 auto; }

  .ss-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
  .ss-brand{ display:flex; align-items:baseline; gap:10px; }
  .ss-brand .eyebrow{ font-size:12px; letter-spacing:.16em; color:var(--ink-soft); }
  .ss-brand h1{ font-family:'Zen Old Mincho',serif; font-size:22px; font-weight:700; margin:0; }
  .ss-backbtn{
    display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--line);
    padding:7px 12px; border-radius:6px; color:var(--ink-soft); font-size:13px; cursor:pointer;
    font-family:inherit;
  }
  .ss-backbtn:hover{ border-color:var(--ink-soft); color:var(--ink); }

  .home-hero{ text-align:center; padding:48px 12px 40px; }
  .home-hero .eyebrow{ font-size:12px; letter-spacing:.22em; color:var(--ink-soft); margin-bottom:10px; }
  .home-hero h1{ font-family:'Zen Old Mincho',serif; font-size:38px; font-weight:900; margin:0 0 14px; line-height:1.4; }
  .home-hero p{ color:var(--ink-soft); font-size:14px; max-width:440px; margin:0 auto; line-height:1.9; }

  .role-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:640px; margin:40px auto 0; }
  @media(max-width:640px){ .role-grid{ grid-template-columns:1fr; } }
  .role-card{
    background:var(--card); border:1px solid var(--line); border-radius:4px;
    padding:28px 24px; text-align:left; cursor:pointer; position:relative;
    transition:transform .15s ease, box-shadow .15s ease; font-family:inherit;
  }
  .role-card:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(28,37,65,0.10); }
  .role-card .num{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-soft); letter-spacing:.1em; }
  .role-card h3{ font-family:'Zen Old Mincho',serif; font-size:20px; margin:10px 0 8px; }
  .role-card p{ font-size:12.5px; color:var(--ink-soft); line-height:1.7; margin:0 0 14px; }
  .role-card .go{ display:flex; align-items:center; gap:4px; font-size:12.5px; color:var(--ink); font-weight:700; }
  .role-card .icon{ color:var(--ink-soft); }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:4px; padding:22px; margin-bottom:18px; }
  .card h2{ font-family:'Zen Old Mincho',serif; font-size:17px; margin:0 0 4px; }
  .card .sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }

  .tabbar{ display:flex; gap:6px; margin-bottom:22px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tab{
    background:none; border:none; padding:10px 14px; font-size:13px; color:var(--ink-soft);
    cursor:pointer; font-family:inherit; border-bottom:2px solid transparent; margin-bottom:-1px;
    display:flex; align-items:center; gap:6px;
  }
  .tab.active{ color:var(--ink); border-bottom-color:var(--stamp); font-weight:700; }
  .tab:hover{ color:var(--ink); }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; }
  .field input, .field select{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:4px;
    font-size:13.5px; font-family:inherit; background:#FCFBF8; color:var(--ink);
  }
  .field input:focus, .field select:focus{ outline:2px solid var(--ink); outline-offset:1px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media(max-width:640px){ .row2,.row3{ grid-template-columns:1fr; } }
  .checkline{ display:flex; align-items:center; gap:8px; font-size:13px; margin:6px 0 14px; }

  .btn{
    display:inline-flex; align-items:center; gap:6px; background:var(--ink); color:#fff;
    border:none; padding:9px 16px; border-radius:4px; font-size:13px; cursor:pointer;
    font-family:inherit; font-weight:600;
  }
  .btn:hover{ background:#101728; }
  .btn.ghost{ background:none; color:var(--ink); border:1px solid var(--line); }
  .btn.ghost:hover{ border-color:var(--ink); }
  .btn.danger{ background:none; color:var(--alert); padding:5px; }
  .btn:disabled{ opacity:.5; cursor:default; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  .tbl-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; }
  .tbl-wrap table{ min-width:640px; }
  th{ text-align:left; font-size:11px; letter-spacing:.04em; color:var(--ink-soft); font-weight:600;
      padding:8px 10px; border-bottom:1px solid var(--line); white-space:nowrap; }
  td{ padding:8px 10px; border-bottom:1px solid #EFEDE5; vertical-align:middle; white-space:nowrap; }
  tr:last-child td{ border-bottom:none; }
  .scoretable input{ width:76px; padding:6px 8px; border:1px solid var(--line); border-radius:4px; font-family:'JetBrains Mono',monospace; }
  .tagchip{
    display:inline-block; background:var(--growth-bg); color:var(--growth); font-size:11px;
    padding:2px 8px; border-radius:10px; margin:0 4px 4px 0;
  }
  .pill{ display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:2px 8px; border-radius:10px; }
  .pill.grad{ background:var(--gold-bg); color:var(--gold); }

  .empty{ text-align:center; padding:32px 12px; color:var(--ink-soft); font-size:13px; }

  .login-box{ max-width:380px; margin:60px auto; }
  .login-box .lock{ width:44px; height:44px; border-radius:50%; background:var(--ink); color:#fff;
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px; }
  .login-box h2{ text-align:center; font-family:'Zen Old Mincho',serif; font-size:20px; margin:0 0 4px; }
  .login-box .sub{ text-align:center; font-size:12.5px; color:var(--ink-soft); margin-bottom:24px; }
  .errmsg{ color:var(--alert); font-size:12.5px; margin-top:10px; text-align:center; }

  .dash-head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px; }
  .dash-head h1{ font-family:'Zen Old Mincho',serif; font-size:26px; margin:0 0 4px; }
  .dash-head .meta{ font-size:12.5px; color:var(--ink-soft); }

  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
  @media(max-width:720px){ .stat-grid{ grid-template-columns:1fr; } }
  .stat-card{ background:var(--card); border:1px solid var(--line); border-radius:4px; padding:18px; }
  .stat-card .label{ font-size:11px; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:8px; }
  .stat-card .value{ font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700; }
  .stat-card .value.small{ font-size:18px; }
  .stat-card .note{ font-size:11.5px; color:var(--ink-soft); margin-top:6px; }

  .stamp{
    width:74px; height:74px; border-radius:50%; border:3px solid var(--stamp); color:var(--stamp);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transform:rotate(-8deg); font-family:'Zen Old Mincho',serif; flex-shrink:0;
    background:rgba(179,57,46,0.03);
  }
  .stamp .r-num{ font-size:22px; font-weight:900; line-height:1; }
  .stamp .r-den{ font-size:10px; margin-top:2px; }

  .delta.up{ color:var(--growth); }
  .delta.down{ color:var(--alert); }
  .delta.flat{ color:var(--ink-soft); }

  .weak-row-wrap{ padding:10px 0; border-bottom:1px solid #EFEDE5; }
  .weak-row-wrap:last-child{ border-bottom:none; }
  .weak-row{ display:flex; align-items:center; gap:12px; }
  .weak-row .tagname{ width:120px; font-size:13px; font-weight:600; flex-shrink:0; }
  .weak-bar-track{ flex:1; height:8px; background:#EFEDE5; border-radius:4px; position:relative; overflow:visible; }
  .weak-bar-fill{ height:8px; border-radius:4px; background:var(--ink-soft); }
  .weak-mark{ position:absolute; top:-3px; width:2px; height:14px; background:var(--stamp); }
  .weak-row .gapval{ width:64px; text-align:right; font-family:'JetBrains Mono',monospace; font-size:12.5px; flex-shrink:0; }

  .section-title{ display:flex; align-items:center; gap:8px; font-family:'Zen Old Mincho',serif; font-size:16px; margin:0 0 14px; }
  .section-title .n{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-soft); border:1px solid var(--line); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }

  .save-toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:9px 18px; border-radius:20px; font-size:12.5px;
    display:flex; align-items:center; gap:6px; z-index:50; box-shadow:0 8px 20px rgba(0,0,0,.2);
  }
  .warn-banner{
    display:flex; gap:10px; align-items:flex-start; background:var(--gold-bg); color:#7A5A16;
    border:1px solid #E9D9AE; border-radius:4px; padding:12px 14px; font-size:12px; line-height:1.7; margin-bottom:20px;
  }
</style>
</head>
